<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ATS Scorer - ResumeForge AI</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; background-color: var(--dark-bg); color: var(--text-primary); }
    .ats-container { flex: 1; padding: 3rem 1rem; max-width: 1000px; margin: 0 auto; width: 100%; display: flex; gap: 2rem; }
    .ats-input-panel { flex: 1; background: var(--surface); border: 1px solid var(--border-color); border-radius: 1rem; padding: 2rem; }
    .ats-result-panel { flex: 1; background: var(--surface); border: 1px solid var(--border-color); border-radius: 1rem; padding: 2rem; }
  </style>
</head>
<body>
<nav class="navbar navbar-light rf-navbar px-3">
  <a href="index.html" class="navbar-brand fw-bold text-decoration-none">ResumeForge <span class="rf-ai-badge">AI</span></a>
  <div class="d-flex align-items-center gap-3">
    <a href="index.html" class="text-secondary text-decoration-none small fw-semibold">← Back to Home</a>
  </div>
</nav>

<div class="ats-container flex-column flex-md-row">
  <div class="ats-input-panel">
    <h5 class="fw-bold mb-4">Check ATS Score</h5>
    
    <label class="form-label small fw-semibold" for="rf-jd-textarea">Paste job description</label>
    <textarea id="rf-jd-textarea" class="form-control form-control-sm mb-4" rows="8" placeholder="Paste the target job description here."></textarea>
    
    <label class="form-label small fw-semibold" for="resume-select">Select a saved resume</label>
    <select id="resume-select" class="form-select form-select-sm mb-3">
      <option value="">-- Choose a resume --</option>
      <!-- Populated via JS -->
    </select>
    
    <div class="text-center mb-3 text-secondary small fw-semibold">OR</div>
    
    <label class="form-label small fw-semibold" for="rf-resume-upload">Upload PDF</label>
    <input type="file" id="rf-resume-upload" class="form-control form-control-sm mb-4" accept=".pdf" />
    
    <button id="rf-analyse-btn" class="btn btn-sm rf-export-btn w-100">Analyse</button>
  </div>
  
  <div class="ats-result-panel">
    <h6 class="fw-bold text-secondary text-uppercase mb-3" style="letter-spacing: .5px; font-size: 12px;">Analysis Result</h6>
    <div id="ats-panel" class="ats-panel"></div>
  </div>
</div>

<script type="module">
  import { getCurrentUser, getResumes, updateATSScore } from '../js/db.js';
  import { analyzeResume, analyzeUploadedResume } from '../js/api_client.js';
  import { ATSChecker } from '../js/ats_checker.js';

  const user = getCurrentUser();
  if (!user) window.location.href = 'login.html';

  const resumes = getResumes();
  const selectEl = document.getElementById('resume-select');
  resumes.forEach(r => {
    const opt = document.createElement('option');
    opt.value = r.id;
    opt.textContent = r.title;
    selectEl.appendChild(opt);
  });

  // Clear file input if select is changed
  selectEl.addEventListener('change', () => {
    if (selectEl.value) document.getElementById('rf-resume-upload').value = '';
  });

  // Clear select if file input is changed
  document.getElementById('rf-resume-upload').addEventListener('change', () => {
    if (document.getElementById('rf-resume-upload').value) selectEl.value = '';
  });

  // Re-use ATSChecker UI logic (requires a custom callback to intercept saving)
  const ats = new ATSChecker("ats-panel", "rf-jd-textarea", "rf-analyse-btn", async (jdText) => {
    const selectedId = selectEl.value;
    const file = document.getElementById("rf-resume-upload").files[0];

    if (!selectedId && !file) {
      ats.showError("Please select a saved resume or upload a PDF.");
      return;
    }

    ats.showLoading();
    try {
      let result;
      if (file) {
        result = await analyzeUploadedResume(file, jdText);
      } else {
        const resume = resumes.find(r => r.id === selectedId);
        // Parse XML string to plain text for API, replacing tags with spaces
        const text = resume.xml
            .replace(/<[^>]+>/g, " ") // strip all tags
            .replace(/&amp;/g, "&")
            .replace(/&lt;/g, "<")
            .replace(/&gt;/g, ">")
            .replace(/&quot;/g, '"')
            .replace(/\s+/g, " ")
            .trim();
        
        result = await analyzeResume(text, jdText);
        
        // Save score to DB
        updateATSScore(selectedId, result.match_score, result.grade);
      }
      ats.display(result);
    } catch (err) {
      ats.showError(err.message ?? "Analysis failed.");
    }
  });
</script>
</body>
</html>
