<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile - ResumeForge AI</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="../css/style.css?v=2.1"/>
  <script src="../js/theme.js?v=2.1"></script>
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; background-color: var(--bg-color); color: var(--text-primary); }
    .profile-container { flex: 1; padding: 3rem 1rem; max-width: 900px; margin: 0 auto; width: 100%; }
    .user-info { background: var(--surface); border: 1px solid var(--border-color); border-radius: 1rem; padding: 2rem; margin-bottom: 2rem; }
    .resume-list { display: flex; flex-direction: column; gap: 1rem; }
    .resume-item { background: var(--surface); border: 1px solid var(--border-color); border-radius: 1rem; padding: 1.5rem; display: flex; justify-content: space-between; align-items: center; }
    .resume-info h6 { margin: 0; font-weight: 600; color: var(--text-primary); }
    .resume-info small { color: var(--text-secondary); }
    .ats-badge { padding: 0.35rem 0.85rem; border-radius: 2rem; font-size: 0.85rem; font-weight: 600; display: inline-block;}
  </style>
</head>
<body>
<nav class="navbar navbar-light rf-navbar px-3">
  <a href="index.html" class="navbar-brand fw-bold text-decoration-none">ResumeForge <span class="rf-ai-badge">AI</span></a>
  <div class="d-flex align-items-center gap-3">
    <a href="index.html" class="text-secondary text-decoration-none small fw-semibold">← Back</a>
    <button id="theme-toggle" class="rf-theme-toggle"></button>
  </div>
</nav>

<div class="profile-container">
  <div class="user-info">
    <h3 class="fw-bold mb-1" id="profile-name"></h3>
    <p class="text-secondary mb-0" id="profile-email"></p>
  </div>
  
  <h4 class="fw-bold mb-3">Saved Resumes</h4>
  <div id="resume-list" class="resume-list">
    <!-- Populated via JS -->
  </div>
</div>

<script type="module">
  import { getCurrentUser, getResumes } from '../js/db.js';
  const user = getCurrentUser();
  if (!user) {
    window.location.href = 'login.html';
  } else {
    document.getElementById('profile-name').textContent = user.name;
    document.getElementById('profile-email').textContent = user.email;
    
    const resumes = getResumes();
    const listEl = document.getElementById('resume-list');
    
    if (resumes.length === 0) {
      listEl.innerHTML = '<p class="text-secondary">No resumes saved yet. Go build one!</p>';
    } else {
      listEl.innerHTML = resumes.map(r => {
        let badge = '';
        if (r.atsScore !== null) {
          badge = `<span class="ats-badge" style="background: rgba(255,255,255,0.05); border: 1px solid var(--border-color);">ATS Score: ${r.atsScore}% (Grade ${r.atsGrade})</span>`;
        } else {
          badge = `<span class="ats-badge text-secondary border border-secondary border-opacity-25">Not Scored</span>`;
        }
        const date = new Date(r.lastModified).toLocaleDateString();
        return `
          <div class="resume-item">
            <div class="resume-info">
              <h6>${r.title}</h6>
              <small>Last modified: ${date}</small>
            </div>
            <div>
              ${badge}
            </div>
          </div>
        `;
      }).join('');
    }
  }
</script>
</body>
</html>
