<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Home - ResumeForge AI</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; background-color: var(--dark-bg); color: var(--text-primary); }
    .home-container { flex: 1; padding: 3rem 1rem; max-width: 900px; margin: 0 auto; width: 100%; }
    .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; margin-top: 2rem; }
    .nav-card { background: var(--surface); border: 1px solid var(--border-color); border-radius: 1rem; padding: 2rem; text-align: center; text-decoration: none; color: inherit; transition: all 0.2s; cursor: pointer; }
    .nav-card:hover { transform: translateY(-5px); border-color: rgba(255,255,255,0.3); box-shadow: 0 10px 30px rgba(0,0,0,0.3); color: inherit; }
    .nav-card h5 { margin-bottom: 0.5rem; font-weight: 600; color: var(--text-primary); }
    .nav-card p { font-size: 0.9rem; color: var(--text-secondary); margin: 0; }
  </style>
</head>
<body>
<nav class="navbar navbar-light rf-navbar px-3">
  <a href="index.html" class="navbar-brand fw-bold text-decoration-none">ResumeForge <span class="rf-ai-badge">AI</span></a>
  <div class="d-flex align-items-center gap-3">
    <span id="user-greeting" class="text-secondary small fw-semibold"></span>
    <button id="logout-btn" class="btn btn-sm rf-export-btn">Logout</button>
  </div>
</nav>

<div class="home-container">
  <h2 class="fw-bold mb-1">Dashboard</h2>
  <p class="text-secondary">What would you like to do today?</p>
  
  <div class="card-grid">
    <a href="profile.html" class="nav-card">
      <h5>Profile</h5>
      <p>View your details and saved resumes.</p>
    </a>
    <a href="builder.html" class="nav-card">
      <h5>Build Resume</h5>
      <p>Create or edit a resume with live preview.</p>
    </a>
    <a href="ats.html" class="nav-card">
      <h5>Check ATS Score</h5>
      <p>Analyze your resume against a job description.</p>
    </a>
  </div>
</div>

<script type="module">
  import { getCurrentUser, logoutUser } from '../js/db.js';
  const user = getCurrentUser();
  if (!user) window.location.href = 'login.html';
  else document.getElementById('user-greeting').textContent = `Hello, ${user.name}`;
  
  document.getElementById('logout-btn').addEventListener('click', () => {
    logoutUser();
    window.location.href = 'login.html';
  });
</script>
</body>
</html>
