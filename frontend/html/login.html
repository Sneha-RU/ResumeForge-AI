<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ResumeForge AI — Log in</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap');

  :root {
    --sage-50:  #f3f6f0;
    --sage-100: #e3ebdc;
    --sage-200: #c9dab8;
    --sage-600: #4f7942;
    --sage-700: #3d5e34;
    --ink:      #1f2a1c;
    --ink-soft: #5b6657;
    --paper:    #fffefb;
    --line:     #d8e0d0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--sage-50);
    background-image:
      radial-gradient(circle at 15% 20%, var(--sage-100) 0%, transparent 45%),
      radial-gradient(circle at 85% 80%, var(--sage-100) 0%, transparent 45%);
    font-family: 'Inter', sans-serif;
    color: var(--ink);
    padding: 24px;
  }

  .card {
    width: 100%;
    max-width: 920px;
    background: var(--paper);
    border-radius: 28px;
    box-shadow: 0 30px 60px -20px rgba(31, 42, 28, 0.18);
    display: grid;
    grid-template-columns: 1.05fr 1fr;
    overflow: hidden;
  }

  /* ── LEFT: illustration panel ───────────────────────────── */
  .art-panel {
    background: linear-gradient(165deg, var(--sage-100), var(--sage-50) 70%);
    position: relative;
    padding: 44px 36px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    overflow: hidden;
  }

  .art-brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .art-brand .word {
    font-family: 'Fraunces', serif;
    font-size: 24px;
    font-weight: 600;
    letter-spacing: -0.2px;
  }
  .art-brand .word span { color: var(--sage-600); }

  /* ── Illustration: resume rebuilding itself ──────────────── */
  .illustration {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px 0;
  }

  .illustration svg { width: 100%; max-width: 320px; height: auto; }

  .art-caption {
    font-family: 'Fraunces', serif;
    font-size: 26px;
    font-weight: 500;
    line-height: 1.25;
    letter-spacing: -0.3px;
    color: var(--ink);
  }
  .art-caption em { font-style: italic; color: var(--sage-600); }

  .art-subcaption {
    margin-top: 10px;
    font-size: 13.5px;
    color: var(--ink-soft);
    line-height: 1.5;
    max-width: 320px;
  }

  /* ── RIGHT: form panel ──────────────────────────────────── */
  .form-panel {
    padding: 52px 48px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .form-heading {
    font-family: 'Fraunces', serif;
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 6px;
    letter-spacing: -0.3px;
  }

  .form-sub {
    font-size: 13.5px;
    color: var(--ink-soft);
    margin-bottom: 32px;
  }
  .form-sub a { color: var(--sage-600); text-decoration: none; font-weight: 500; }
  .form-sub a:hover { text-decoration: underline; }

  /* Floating label inputs */
  .field {
    position: relative;
    margin-bottom: 16px;
  }

  .field input {
    width: 100%;
    padding: 18px 16px 8px;
    font-size: 14.5px;
    font-family: 'Inter', sans-serif;
    color: var(--ink);
    background: var(--sage-50);
    border: 1.5px solid transparent;
    border-radius: 12px;
    outline: none;
    transition: border-color .15s ease, background .15s ease;
  }

  .field input::placeholder { color: transparent; }

  .field input:focus {
    border-color: var(--sage-600);
    background: var(--paper);
  }

  .field label {
    position: absolute;
    left: 16px;
    top: 18px;
    font-size: 14.5px;
    color: var(--ink-soft);
    pointer-events: none;
    transform-origin: left top;
    transition: transform .15s ease, top .15s ease, color .15s ease;
  }

  .field input:focus + label,
  .field input:not(:placeholder-shown) + label {
    top: 7px;
    transform: scale(0.74);
    color: var(--sage-600);
  }

  .toggle-visibility {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--ink-soft);
    padding: 4px;
    display: flex;
  }
  .toggle-visibility:hover { color: var(--sage-700); }
  .toggle-visibility svg { width: 18px; height: 18px; }

  .field-row-end {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 22px;
  }
  .field-row-end a {
    font-size: 12.5px;
    color: var(--ink-soft);
    text-decoration: none;
  }
  .field-row-end a:hover { color: var(--sage-700); text-decoration: underline; }

  .btn-primary {
    width: 100%;
    padding: 15px;
    background: var(--sage-600);
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 14.5px;
    font-weight: 600;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: background .15s ease, transform .1s ease;
  }
  .btn-primary:hover { background: var(--sage-700); }
  .btn-primary:active { transform: scale(0.99); }

  .divider {
    display: flex;
    align-items: center;
    gap: 14px;
    margin: 26px 0 18px;
  }
  .divider::before, .divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--line);
  }
  .divider span {
    font-size: 12.5px;
    color: var(--ink-soft);
    white-space: nowrap;
  }

  .social-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .btn-social {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 11px;
    background: var(--sage-50);
    border: 1.5px solid var(--line);
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
    cursor: pointer;
    transition: background .15s ease, border-color .15s ease;
  }
  .btn-social:hover { background: var(--paper); border-color: var(--sage-600); }
  .btn-social svg { width: 16px; height: 16px; flex-shrink: 0; }

  .signup-line {
    text-align: center;
    margin-top: 26px;
    font-size: 13px;
    color: var(--ink-soft);
  }
  .signup-line a {
    color: var(--sage-600);
    font-weight: 600;
    text-decoration: none;
  }
  .signup-line a:hover { text-decoration: underline; }

  /* ── Responsive ──────────────────────────────────────────── */
  @media (max-width: 760px) {
    .card { grid-template-columns: 1fr; }
    .art-panel { padding: 32px 28px; min-height: 260px; }
    .illustration { padding: 16px 0; }
    .illustration svg { max-width: 200px; }
    .art-caption { font-size: 21px; }
    .form-panel { padding: 36px 28px 44px; }
  }
</style>
</head>
<body>

<div class="card">

  <!-- ════════════ LEFT: illustration ════════════ -->
  <div class="art-panel">

    <div class="art-brand">
      <div class="word">Resume<span>Forge</span></div>
    </div>

    <div class="illustration">
      <!-- Original illustration: a tangled resume draft resolving
           into a clean, structured one — visualises what the
           product's ATS scorer actually does. -->
      <svg viewBox="0 0 320 340" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A messy resume draft transforming into a clean, organised resume">

        <!-- soft背景 blob -->
        <ellipse cx="160" cy="175" rx="138" ry="148" fill="#dce8d2" opacity="0.5"/>

        <!-- ── Back sheet: messy draft ── -->
        <g transform="translate(38,40) rotate(-7)">
          <rect x="0" y="0" width="150" height="190" rx="10" fill="#fff" stroke="#c9dab8" stroke-width="2"/>
          <!-- scribbled / crossed-out lines -->
          <path d="M18 28 H110" stroke="#c9dab8" stroke-width="4" stroke-linecap="round"/>
          <path d="M18 44 H132" stroke="#c9dab8" stroke-width="4" stroke-linecap="round"/>
          <path d="M18 60 H80"  stroke="#c9dab8" stroke-width="4" stroke-linecap="round"/>
          <path d="M14 56 L86 70" stroke="#e0a458" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M18 92 H120" stroke="#c9dab8" stroke-width="4" stroke-linecap="round"/>
          <path d="M18 108 H100" stroke="#c9dab8" stroke-width="4" stroke-linecap="round"/>
          <path d="M18 124 H132" stroke="#c9dab8" stroke-width="4" stroke-linecap="round"/>
          <path d="M14 120 L138 132" stroke="#e0a458" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M18 156 H90"  stroke="#c9dab8" stroke-width="4" stroke-linecap="round"/>
          <path d="M18 172 H115" stroke="#c9dab8" stroke-width="4" stroke-linecap="round"/>
        </g>

        <!-- ── Front sheet: clean, structured resume ── -->
        <g transform="translate(118,76) rotate(4)">
          <rect x="0" y="0" width="160" height="206" rx="12" fill="#ffffff" stroke="#4f7942" stroke-width="2.5"/>
          <!-- name / header -->
          <rect x="20" y="22" width="74" height="9" rx="4.5" fill="#1f2a1c"/>
          <rect x="20" y="38" width="48" height="6" rx="3" fill="#9fb88e"/>
          <!-- divider -->
          <path d="M20 56 H140" stroke="#e3ebdc" stroke-width="2"/>
          <!-- section block 1 -->
          <rect x="20" y="70" width="30" height="6" rx="3" fill="#4f7942"/>
          <rect x="20" y="84" width="120" height="5" rx="2.5" fill="#dde6d3"/>
          <rect x="20" y="95" width="104" height="5" rx="2.5" fill="#dde6d3"/>
          <rect x="20" y="106" width="112" height="5" rx="2.5" fill="#dde6d3"/>
          <!-- section block 2 -->
          <rect x="20" y="126" width="36" height="6" rx="3" fill="#4f7942"/>
          <rect x="20" y="140" width="120" height="5" rx="2.5" fill="#dde6d3"/>
          <rect x="20" y="151" width="96"  height="5" rx="2.5" fill="#dde6d3"/>
          <!-- check badge -->
          <circle cx="140" cy="184" r="16" fill="#4f7942"/>
          <path d="M133 184 L138 189 L148 178" stroke="#fff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </g>

        <!-- ── Floating sparkle accents (AI signal) ── -->
        <g stroke="#4f7942" stroke-width="2.4" stroke-linecap="round">
          <path d="M268 96 L268 110 M261 103 L275 103"/>
          <path d="M52 240 L52 250 M47 245 L57 245"/>
        </g>
        <circle cx="282" cy="200" r="4" fill="#e0a458"/>
        <circle cx="44"  cy="92"  r="3" fill="#9fb88e"/>

        <!-- ── Curved arrow: draft → polished ── -->
        <path d="M96 150 C84 168, 84 192, 100 206" stroke="#e0a458" stroke-width="2.4" stroke-linecap="round" fill="none" stroke-dasharray="1 7"/>
        <path d="M94 200 L100 206 L107 198" stroke="#e0a458" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>

    <div>
      <p class="art-caption">Your draft, <em>refined</em> by AI.</p>
      <p class="art-subcaption">Real-time ATS scoring and keyword analysis so every version you save is stronger than the last.</p>
    </div>

  </div>

  <!-- ════════════ RIGHT: form ════════════ -->
  <div class="form-panel">

    <h1 class="form-heading">Welcome back</h1>
    <p class="form-sub">New here? <a href="register.html">Create an account</a> to start building.</p>

    <form id="login-form">
      <div class="field">
        <input type="text" id="username" placeholder="Username" autocomplete="username"/>
        <label for="username">Username or email</label>
      </div>

      <div class="field">
        <input type="password" id="password" placeholder="Password" autocomplete="current-password"/>
        <label for="password">Password</label>
        <button type="button" class="toggle-visibility" id="toggle-pw" aria-label="Show password">
          <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>

      <div class="field-row-end">
        <a href="#">Forgot password?</a>
      </div>

      <button type="submit" class="btn-primary">Log in</button>
    </form>

    <div class="divider"><span>or continue with</span></div>

    <div class="social-row">
      <button class="btn-social" type="button" onclick="socialLogin('GitHub')">
        <svg viewBox="0 0 24 24" fill="#1f2a1c"><path d="M12 .5C5.7.5.7 5.6.7 12c0 5.1 3.3 9.4 7.9 11 .6.1.8-.3.8-.6v-2.1c-3.2.7-3.9-1.4-3.9-1.4-.5-1.3-1.3-1.7-1.3-1.7-1.1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1.1 1.8 2.8 1.3 3.4 1 .1-.8.4-1.3.7-1.6-2.6-.3-5.3-1.3-5.3-5.7 0-1.3.5-2.3 1.2-3.1-.1-.3-.5-1.5.1-3 0 0 1-.3 3.3 1.2.9-.3 2-.4 3-.4s2.1.1 3 .4c2.3-1.5 3.3-1.2 3.3-1.2.6 1.5.2 2.7.1 3 .8.8 1.2 1.9 1.2 3.1 0 4.4-2.7 5.4-5.3 5.7.4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.6 4.6-1.6 7.9-5.9 7.9-11C23.3 5.6 18.3.5 12 .5z"/></svg>
        GitHub
      </button>
      <button class="btn-social" type="button" onclick="socialLogin('Google')">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M23.5 12.3c0-.8-.1-1.6-.2-2.4H12v4.5h6.5c-.3 1.5-1.1 2.8-2.4 3.6v3h3.9c2.3-2.1 3.5-5.2 3.5-8.7z"/><path fill="#34A853" d="M12 24c3.2 0 5.9-1.1 7.9-2.9l-3.9-3c-1.1.7-2.4 1.1-4 1.1-3.1 0-5.7-2.1-6.6-4.9H1.4v3.1C3.4 21.3 7.4 24 12 24z"/><path fill="#FBBC05" d="M5.4 14.3c-.2-.7-.4-1.5-.4-2.3s.1-1.6.4-2.3V6.6H1.4C.5 8.3 0 10.1 0 12s.5 3.7 1.4 5.4l4-3.1z"/><path fill="#EA4335" d="M12 4.8c1.7 0 3.3.6 4.5 1.8l3.4-3.4C17.9 1.2 15.2 0 12 0 7.4 0 3.4 2.7 1.4 6.6l4 3.1c.9-2.8 3.5-4.9 6.6-4.9z"/></svg>
        Google
      </button>
    </div>

    <p class="signup-line">By continuing you agree to ResumeForge's <a href="#">Terms</a> &amp; <a href="#">Privacy Policy</a>.</p>

  </div>

</div>

<script type="module">
  import { loginUser } from '../js/db.js';

  const pwInput = document.getElementById('password');
  const toggleBtn = document.getElementById('toggle-pw');
  const eyeIcon = document.getElementById('eye-icon');

  const eyeOpen = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  const eyeClosed = `<path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a18.6 18.6 0 0 1 5.06-5.94M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a18.6 18.6 0 0 1-2.16 3.19M14.12 14.12a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`;

  window.toggleBtnClick = () => {
    const isPassword = pwInput.type === 'password';
    pwInput.type = isPassword ? 'text' : 'password';
    eyeIcon.innerHTML = isPassword ? eyeClosed : eyeOpen;
    toggleBtn.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
  };
  toggleBtn.addEventListener('click', window.toggleBtnClick);

  document.getElementById('login-form').addEventListener('submit', (e) => {
    e.preventDefault();
    loginUser(document.getElementById('username').value, document.getElementById('username').value);
    window.location.href = 'index.html';
  });

  // Handle Third-Party OAuth Login
  window.socialLogin = function(provider) {
    const oauthName = "Guest User (" + provider + ")";
    const oauthEmail = "guest_" + provider.toLowerCase() + "@example.com";
    
    loginUser(oauthName, oauthEmail);
    window.location.href = 'index.html';
  };
</script>

</body>
</html>
