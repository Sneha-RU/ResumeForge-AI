<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - ResumeForge AI</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    /* Resetting the global dark body for this specific page */
    body {
      background-color: #e2e4e9 !important; /* light gray background */
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    
    .login-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    
    .login-card {
      background: #ffffff;
      border-radius: 1.5rem;
      width: 100%;
      max-width: 1000px;
      min-height: 600px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.08);
      display: flex;
      overflow: hidden;
    }
    
    /* Left Side: Form */
    .login-form-side {
      flex: 1;
      padding: 4rem 3rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    
    .login-heading {
      font-weight: 800;
      font-size: 2.2rem;
      color: #111;
      margin-bottom: 0.5rem;
    }
    
    .login-subheading {
      color: #666;
      font-size: 0.95rem;
      margin-bottom: 2.5rem;
      line-height: 1.5;
    }
    
    .login-subheading strong {
      color: #111;
    }
    
    .custom-input {
      border-radius: 2rem;
      padding: 0.8rem 1.5rem;
      border: 1px solid #ccc;
      font-size: 0.95rem;
      background-color: #fafafa;
    }
    
    .custom-input:focus {
      border-color: #111;
      box-shadow: none;
      background-color: #fff;
    }
    
    .forgot-password {
      text-align: right;
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
    }
    
    .forgot-password a {
      color: #555;
      text-decoration: none;
    }
    
    .forgot-password a:hover {
      text-decoration: underline;
    }
    
    .btn-login {
      background-color: #111;
      color: #fff;
      border-radius: 2rem;
      padding: 0.8rem;
      font-weight: 600;
      border: none;
      transition: background-color 0.2s;
    }
    
    .btn-login:hover {
      background-color: #333;
      color: #fff;
    }
    
    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 2rem 0;
      color: #888;
      font-size: 0.85rem;
    }
    
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid #eee;
    }
    
    .divider::before { margin-right: 1rem; }
    .divider::after { margin-left: 1rem; }
    
    .social-btns {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 2rem;
    }
    
    .social-btn {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background-color: #111;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-size: 1.1rem;
      transition: transform 0.2s;
    }
    
    .social-btn:hover {
      transform: translateY(-2px);
      color: #fff;
    }
    
    .register-text {
      text-align: center;
      font-size: 0.9rem;
      color: #666;
    }
    
    .register-text a {
      color: #4CAF50; /* Green tint */
      font-weight: 600;
      text-decoration: none;
    }
    
    /* Right Side: Illustration */
    .login-image-side {
      flex: 1;
      background-color: #f2f9f1; /* Light green tint */
      padding: 3rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    
    .login-image-side img {
      max-width: 100%;
      height: auto;
      margin-bottom: 2rem;
      border-radius: 1rem;
      mix-blend-mode: multiply;
    }
    
    .illustration-text {
      text-align: center;
      font-size: 1.2rem;
      font-weight: 500;
      color: #333;
      line-height: 1.4;
    }
    
    .illustration-text strong {
      color: #111;
      font-weight: 700;
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      .login-card {
        flex-direction: column;
      }
      .login-image-side {
        display: none; /* Hide illustration on small screens */
      }
      .login-form-side {
        padding: 3rem 2rem;
      }
    }
  </style>
</head>
<body>

<div class="login-wrapper">
  <div class="login-card">
    
    <!-- Left: Form -->
    <div class="login-form-side">
      <h1 class="login-heading">Welcome back!</h1>
      <p class="login-subheading">
        Simplify your job search and boost your application success with <strong>ResumeForge AI</strong>. Get started for free.
      </p>
      
      <form id="login-form">
        <div class="mb-3">
          <input type="text" id="name" class="form-control custom-input" required placeholder="Full Name" />
        </div>
        <div class="mb-2 position-relative">
          <input type="email" id="email" class="form-control custom-input" required placeholder="Email Address" />
        </div>
        
        <div class="forgot-password">
          <a href="#">Forgot Password?</a>
        </div>
        
        <button type="submit" class="btn btn-login w-100">Login</button>
      </form>
      
      <div class="divider">or continue with</div>
      
      <div class="social-btns">
        <a href="#" class="social-btn"><i class="fab fa-google"></i></a>
        <a href="#" class="social-btn"><i class="fab fa-apple"></i></a>
        <a href="#" class="social-btn"><i class="fab fa-facebook-f"></i></a>
      </div>
      
      <div class="register-text">
        Not a member? <a href="#">Register now</a>
      </div>
    </div>
    
    <!-- Right: Illustration -->
    <div class="login-image-side">
      <!-- We load the generated image here -->
      <img src="../img/login_illustration.png" alt="ResumeForge AI Illustration" />
      <div class="illustration-text">
        Make your resume stand out and land more interviews with <strong>ResumeForge AI</strong>
      </div>
    </div>
    
  </div>
</div>

<script type="module">
  import { loginUser } from '../js/db.js';
  document.getElementById('login-form').addEventListener('submit', (e) => {
    e.preventDefault();
    loginUser(document.getElementById('name').value, document.getElementById('email').value);
    window.location.href = 'index.html';
  });
</script>
</body>
</html>
