<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - ResumeForge AI</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; background-color: var(--dark-bg); }
    .login-container { flex: 1; display: flex; align-items: center; justify-content: center; }
    .login-card { background: var(--surface); padding: 2.5rem; border-radius: 1rem; border: 1px solid var(--border-color); width: 100%; max-width: 400px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
  </style>
</head>
<body>
<nav class="navbar navbar-light rf-navbar px-3">
  <span class="navbar-brand fw-bold">ResumeForge <span class="rf-ai-badge">AI</span></span>
</nav>

<div class="login-container">
  <div class="login-card">
    <h4 class="text-center mb-4 text-white">Welcome Back</h4>
    <form id="login-form">
      <div class="mb-3">
        <label class="form-label text-secondary small fw-semibold">Name</label>
        <input type="text" id="name" class="form-control" required placeholder="Enter your name" />
      </div>
      <div class="mb-4">
        <label class="form-label text-secondary small fw-semibold">Email</label>
        <input type="email" id="email" class="form-control" required placeholder="Enter your email" />
      </div>
      <button type="submit" class="btn rf-export-btn w-100">Log In</button>
    </form>
  </div>
</div>

<script type="module">
  import { loginUser } from '../js/db.js';
  document.getElementById('login-form').addEventListener('submit', (e) => {
    e.preventDefault();
    loginUser(document.getElementById('name').value, document.getElementById('email').value);
    window.location.href = 'index.html';
  });
</script>
</body>
</html>
