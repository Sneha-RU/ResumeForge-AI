<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register - ResumeForge AI</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    body {
      background-color: #d8ebd8; 
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      font-family: 'Inter', -apple-system, sans-serif;
    }
    
    .login-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    
    .login-card {
      background: #ffffff;
      border-radius: 1.5rem;
      width: 100%;
      max-width: 900px;
      min-height: 550px;
      box-shadow: 0 15px 50px rgba(0,0,0,0.1);
      display: flex;
      overflow: hidden;
      padding: 1.5rem;
    }
    
    /* Left Side: Illustration */
    .login-image-side {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #d8ebd8;
      border-radius: 1rem;
      overflow: hidden;
    }
    
    .login-image-side img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    /* Right Side: Form */
    .login-form-side {
      flex: 1.2;
      padding: 2rem 4rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    
    .custom-input {
      background-color: #ebf1fb;
      border: none;
      border-radius: 0.5rem;
      padding: 0.9rem 1.2rem;
      font-size: 0.95rem;
      color: #333;
    }
    
    .custom-input:focus {
      box-shadow: 0 0 0 2px #2e7d32;
      background-color: #fff;
    }
    
    .btn-login {
      background-color: #2e7d32;
      color: #fff;
      padding: 0.9rem;
      font-weight: 600;
      border: none;
      border-radius: 6px 20px 6px 20px;
      transition: background-color 0.2s, transform 0.1s;
      margin-top: 1rem;
      margin-bottom: 2rem;
    }
    
    .btn-login:hover {
      background-color: #1b5e20;
      color: #fff;
      transform: translateY(-1px);
    }
    
    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      color: #333;
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }
    
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid #ddd;
    }
    
    .divider::before { margin-right: 1rem; }
    .divider::after { margin-left: 1rem; }
    
    .social-btns {
      display: flex;
      justify-content: space-between;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
    
    .social-btn {
      flex: 1;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 0.5rem;
      padding: 0.6rem 0;
      color: #555;
      font-size: 0.85rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      text-decoration: none;
      transition: background 0.2s;
    }
    
    .social-btn:hover {
      background: #f8f9fa;
      color: #333;
    }
    
    .social-btn i {
      font-size: 1.1rem;
    }

    .register-link {
      text-align: center;
      font-size: 0.85rem;
      color: #666;
    }
    
    .register-link a {
      color: #2e7d32;
      font-weight: 600;
      text-decoration: none;
    }

    .input-wrapper {
      position: relative;
      margin-bottom: 1.2rem;
    }

    /* Simple visibility toggle for password */
    .eye-icon {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #666;
      cursor: pointer;
    }

    @media (max-width: 768px) {
      .login-card {
        flex-direction: column;
        padding: 1rem;
      }
      .login-image-side {
        display: none;
      }
      .login-form-side {
        padding: 2rem 1.5rem;
      }
      .social-btns {
        flex-wrap: wrap;
      }
      .social-btn {
        min-width: 45%;
      }
    }
  </style>
</head>
<body>

<div class="login-wrapper">
  <div class="login-card">
    
    <!-- Left: Illustration -->
    <div class="login-image-side">
      <img src="../img/login_illustration_v2.png" alt="ResumeForge AI Background" loading="lazy" />
    </div>
    
    <!-- Right: Form -->
    <div class="login-form-side">
      
      <form id="register-form">
        <div class="input-wrapper">
          <input type="text" id="name" class="form-control custom-input" required placeholder="Full Name" />
        </div>
        
        <div class="input-wrapper">
          <input type="email" id="email" class="form-control custom-input" required placeholder="Email Address" />
        </div>

        <div class="input-wrapper">
          <input type="password" id="password" class="form-control custom-input" required placeholder="Password" />
          <i class="fas fa-eye-slash eye-icon" onclick="togglePassword()"></i>
        </div>
        
        <button type="submit" class="btn btn-login w-100">Register</button>
      </form>
      
      <div class="divider">Sign up with</div>
      
      <div class="social-btns">
        <a href="#" class="social-btn" onclick="socialLogin('Google')"><i class="fab fa-google"></i> Google</a>
        <a href="#" class="social-btn" onclick="socialLogin('Apple')"><i class="fab fa-apple"></i> Apple</a>
        <a href="#" class="social-btn" onclick="socialLogin('GitHub')"><i class="fab fa-github"></i> GitHub</a>
        <a href="#" class="social-btn" onclick="socialLogin('LinkedIn')"><i class="fab fa-linkedin"></i> LinkedIn</a>
      </div>

      <div class="register-link">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
      
    </div>
    
  </div>
</div>

<script type="module">
  import { registerUser, loginUser } from '../js/db.js';
  
  // Toggle password visibility
  window.togglePassword = function() {
    const pwd = document.getElementById('password');
    const icon = document.querySelector('.eye-icon');
    if (pwd.type === 'password') {
      pwd.type = 'text';
      icon.classList.remove('fa-eye-slash');
      icon.classList.add('fa-eye');
    } else {
      pwd.type = 'password';
      icon.classList.remove('fa-eye');
      icon.classList.add('fa-eye-slash');
    }
  };

  // Standard Form Registration
  document.getElementById('register-form').addEventListener('submit', (e) => {
    e.preventDefault();
    registerUser(
      document.getElementById('name').value, 
      document.getElementById('email').value,
      document.getElementById('password').value
    );
    window.location.href = 'index.html';
  });

  // Handle Third-Party OAuth Registration
  window.socialLogin = function(provider) {
    const oauthName = "Guest User (" + provider + ")";
    const oauthEmail = "guest_" + provider.toLowerCase() + "@example.com";
    
    loginUser(oauthName, oauthEmail);
    window.location.href = 'index.html';
  };
</script>
</body>
</html>
